# Blue/green: deploy.sh switches the `server openemr_*:80;` line in upstream openemr_active.
#
# Public URL (host): http://openemr.greenhood.com.ng:8008  (Compose maps host 8008 -> container 80)
#
# TLS: add certificates later (certbot). See commented server block at bottom.
#
# If you use the OpenEMR Docker stack, prefer the nginx *container* and disable host nginx:
#   sudo systemctl disable --now nginx

upstream openemr_active {
    server openemr_blue:80;
}

server {
    listen 80;
    server_name openemr.greenhood.com.ng;

    location / {
        proxy_pass http://openemr_active;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_redirect off;
    }
}

