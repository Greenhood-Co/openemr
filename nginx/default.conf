# Blue/green: active backend is the `server` line inside active-upstream.conf
# (rewritten by scripts/deploy.sh). Requires nginx 1.21.3+ (include inside upstream).

upstream openemr_active {
    include /etc/nginx/conf.d/active-upstream.conf;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://openemr_active;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_redirect off;
    }
}
