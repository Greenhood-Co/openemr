# Greenhood OpenEMR stack (MariaDB + blue/green app + Nginx reverse proxy).
#
# Base: aligned with upstream docker/production/docker-compose.yml (official openemr/openemr image,
# MariaDB 11.8, healthchecks). Customizations live in ./Dockerfile, docker/greenhood/, and this file —
# do not edit docker/production/docker-compose.yml in place; merge upstream changes here when upgrading.
#
# First-time install (avoid racing auto_configure on the shared sites volume):
#   docker compose up -d mysql openemr_blue nginx
# After blue is healthy and the DB is initialized, you may enable the standby slot:
#   COMPOSE_PROFILES=standby docker compose up -d openemr_green
#
# Only Nginx is published to the host (see ports on the nginx service).

name: ${COMPOSE_PROJECT_NAME:-greenhood-openemr}

x-openemr-environment: &openemr-environment
  MYSQL_HOST: ${OPENEMR_MYSQL_HOST:-172.29.8.10}
  MYSQL_ROOT_PASS: ${MYSQL_ROOT_PASSWORD}
  MYSQL_USER: ${MYSQL_USER:-openemr}
  MYSQL_PASS: ${MYSQL_PASS}
  MYSQL_DATABASE: ${MYSQL_DATABASE:-openemr}
  OE_USER: ${OE_USER:-owner}
  OE_PASS: ${OE_PASS}
  OE_ADMIN_DISPLAY_NAME: ${OE_ADMIN_DISPLAY_NAME:-}
  TRAINING_ACCOUNT_PASSWORD: ${TRAINING_ACCOUNT_PASSWORD:-}

x-openemr-volumes: &openemr-volumes
  - openemr_sites:/var/www/localhost/htdocs/openemr/sites

networks:
  openemr_internal:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.29.8.0/24

services:
  mysql:
    image: mariadb:11.8.6@sha256:f5644a292224cdf4b6514aca38b3b4436f0b0443d54170a472cd14261f31402d
    command: ['mariadbd', '--character-set-server=utf8mb4']
    restart: unless-stopped
    networks:
      openemr_internal:
        ipv4_address: 172.29.8.10
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-openemr}
      MYSQL_USER: ${MYSQL_USER:-openemr}
      MYSQL_PASSWORD: ${MYSQL_PASS}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', '/usr/local/bin/healthcheck.sh', '--su-mysql', '--connect', '--innodb_initialized']
      start_period: 2m
      start_interval: 5s
      interval: 1m
      timeout: 5s
      retries: 5

  openemr_blue:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${OPENEMR_IMAGE_NAME:-greenhood-openemr}:${OPENEMR_IMAGE_TAG:-local}
    restart: unless-stopped
    networks:
      openemr_internal:
        ipv4_address: 172.29.8.11
    expose:
      - "80"
    environment:
      <<: *openemr-environment
    volumes: *openemr-volumes
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /usr/bin/curl
        - --fail
        - --location
        - --show-error
        - --silent
        - http://127.0.0.1/meta/health/readyz
      start_period: 3m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3

  openemr_green:
    profiles: [standby]
    image: ${OPENEMR_IMAGE_NAME:-greenhood-openemr}:${OPENEMR_IMAGE_TAG:-local}
    restart: unless-stopped
    networks:
      openemr_internal:
        ipv4_address: 172.29.8.12
    expose:
      - "80"
    environment:
      <<: *openemr-environment
    volumes: *openemr-volumes
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /usr/bin/curl
        - --fail
        - --location
        - --show-error
        - --silent
        - http://127.0.0.1/meta/health/readyz
      start_period: 3m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks:
      - openemr_internal
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./docker/greenhood/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/greenhood/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/greenhood/nginx/active-backend.conf:/etc/nginx/active-backend.conf:rw
    depends_on:
      openemr_blue:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1/nginx-health']
      start_period: 3m
      start_interval: 10s
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data: {}
  openemr_sites: {}
