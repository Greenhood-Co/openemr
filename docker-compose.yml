# Production-style stack: MariaDB + two OpenEMR app slots (blue/green).
# Host nginx serves this app via sites-enabled (see nginx/openemr.greenhood.com.ng); no nginx container.
#
# MariaDB uses a fixed IPv4 on openemr_internal so OpenEMR can use MYSQL_HOST without Docker DNS
# (some hosts see flaky getaddrinfo for service names). Override via OPENEMR_MYSQL_HOST in .env.
#
# First boot (single installer on empty site volume):
#   docker compose up -d mysql openemr_blue
#
# Do NOT start openemr_green until blue is healthy: both share volume openemr_sites and will race
# auto_configure. Do not set COMPOSE_PROFILES=standby until after the first successful install.
#
# Static DB IP is 172.29.8.10; if you change the subnet or address below, set OPENEMR_MYSQL_HOST to match.
#
# Install vhost once on the VPS:
#   sudo cp nginx/openemr.greenhood.com.ng /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Blue/green: ./deploy.sh (repo root) — only edits /etc/nginx/sites-enabled/openemr.greenhood.com.ng

name: ${COMPOSE_PROJECT_NAME:-greenhood-openemr}

x-openemr-environment: &openemr-environment
  MYSQL_HOST: ${OPENEMR_MYSQL_HOST:-172.29.8.10}
  MYSQL_ROOT_PASS: ${MYSQL_ROOT_PASSWORD}
  MYSQL_USER: ${MYSQL_USER:-openemr}
  MYSQL_PASS: ${MYSQL_PASS}
  MYSQL_DATABASE: ${MYSQL_DATABASE:-openemr}
  OE_USER: ${OE_USER:-owner}
  OE_PASS: ${OE_PASS}
  OE_ADMIN_DISPLAY_NAME: ${OE_ADMIN_DISPLAY_NAME:-}

x-openemr-volumes: &openemr-volumes
  - openemr_sites:/var/www/localhost/htdocs/openemr/sites

networks:
  openemr_internal:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.29.8.0/24

services:
  mysql:
    image: mariadb:11.8.6@sha256:f5644a292224cdf4b6514aca38b3b4436f0b0443d54170a472cd14261f31402d
    command: ['mariadbd', '--character-set-server=utf8mb4']
    restart: unless-stopped
    networks:
      openemr_internal:
        ipv4_address: 172.29.8.10
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # MariaDB entrypoint creates DB + user on first init (MYSQL_PASSWORD, not MYSQL_PASS).
      # Without these, only root exists and OpenEMR’s quick setup hits Access denied for openemr@…
      MYSQL_DATABASE: ${MYSQL_DATABASE:-openemr}
      MYSQL_USER: ${MYSQL_USER:-openemr}
      MYSQL_PASSWORD: ${MYSQL_PASS}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', '/usr/local/bin/healthcheck.sh', '--su-mysql', '--connect', '--innodb_initialized']
      start_period: 2m
      start_interval: 5s
      interval: 1m
      timeout: 5s
      retries: 5

  openemr_blue:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${OPENEMR_IMAGE_NAME:-greenhood-openemr}:${OPENEMR_IMAGE_TAG:-local}
    restart: unless-stopped
    networks:
      - openemr_internal
    ports:
      - "127.0.0.1:${OPENEMR_BLUE_HOST_PORT:-18081}:80"
    environment:
      <<: *openemr-environment
    volumes: *openemr-volumes
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /usr/bin/curl
        - --fail
        - --location
        - --show-error
        - --silent
        - http://127.0.0.1/meta/health/readyz
      start_period: 3m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3

  openemr_green:
    profiles: [standby]
    image: ${OPENEMR_IMAGE_NAME:-greenhood-openemr}:${OPENEMR_IMAGE_TAG:-local}
    restart: unless-stopped
    networks:
      - openemr_internal
    ports:
      - "127.0.0.1:${OPENEMR_GREEN_HOST_PORT:-18082}:80"
    environment:
      <<: *openemr-environment
    volumes: *openemr-volumes
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /usr/bin/curl
        - --fail
        - --location
        - --show-error
        - --silent
        - http://127.0.0.1/meta/health/readyz
      start_period: 3m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3

volumes:
  mariadb_data: {}
  openemr_sites: {}
